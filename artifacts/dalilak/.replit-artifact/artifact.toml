kind = "web"
previewPath = "/dalilak/"
title = "دليلك"
version = "1.0.0"
id = "artifacts/dalilak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dalilak/" ]
localPort = 19025

[services.development]
run = "pnpm --filter @workspace/dalilak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dalilak", "run", "build" ]
publicDir = "artifacts/dalilak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19025"
BASE_PATH = "/dalilak/"
