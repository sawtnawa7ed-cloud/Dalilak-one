name: apk

on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          python-version: '3.10'
          architecture: x64
      - run: flutter pub get
      - run: flutter build apk --split-per-abi
